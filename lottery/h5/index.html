<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>双色球彩票管理</title>
    <link rel="stylesheet" href="css/style.css">
    <!-- 图标库 -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
</head>
<body>
    <!-- 顶部导航 -->
    <header class="header">
        <h1>🎱 双色球彩票管理</h1>
        <div class="subtitle">记录每一次期待</div>
    </header>

    <!-- 首页 -->
    <div id="page-home" class="page active">
        <!-- 统计卡片 -->
        <div class="card">
            <div class="stats-grid">
                <div class="stat-item">
                    <div class="stat-value" id="stat-total">0</div>
                    <div class="stat-label">购买记录</div>
                </div>
                <div class="stat-item">
                    <div class="stat-value" id="stat-wins">0</div>
                    <div class="stat-label">中奖次数</div>
                </div>
                <div class="stat-item">
                    <div class="stat-value" id="stat-amount">0</div>
                    <div class="stat-label">总奖金(元)</div>
                </div>
            </div>
        </div>

        <!-- 快速操作 -->
        <div class="card">
            <div style="display: flex; gap: 12px;">
                <button class="btn btn-primary btn-block" onclick="openAddModal()">
                    <i class="bi bi-plus-lg"></i> 添加记录
                </button>
                <button class="btn btn-outline btn-block" onclick="openCamera()">
                    <i class="bi bi-camera"></i> 拍照识别
                </button>
            </div>
        </div>

        <!-- 最近记录 -->
        <div class="card">
            <div class="card-header">
                <span class="card-title">最近记录</span>
                <button class="btn btn-sm btn-outline" onclick="syncToFeishu()">
                    <i class="bi bi-cloud-upload"></i> 同步
                </button>
            </div>
            <div id="record-list" class="record-list">
                <!-- 记录列表由JS动态生成 -->
            </div>
            <div id="empty-state" class="empty-state" style="display: none;">
                <i class="bi bi-receipt"></i>
                <h3>暂无记录</h3>
                <p>点击上方添加按钮记录您的彩票</p>
            </div>
        </div>
    </div>

    <!-- 预测页 -->
    <div id="page-prediction" class="page">
        <!-- 冷热号统计 -->
        <div class="card">
            <div class="card-header">
                <span class="card-title">📊 冷热号统计</span>
                <span class="stat-label" id="draw-count">基于 0 期</span>
            </div>
            <div style="display: flex; gap: 24px;">
                <div style="flex: 1;">
                    <div style="color: var(--danger); font-weight: 500; margin-bottom: 8px;">🔥 热门红球</div>
                    <div id="hot-red-balls" class="lottery-balls"></div>
                </div>
                <div style="flex: 1;">
                    <div style="color: var(--blue-ball); font-weight: 500; margin-bottom: 8px;">❄️ 冷门红球</div>
                    <div id="cold-red-balls" class="lottery-balls"></div>
                </div>
            </div>
        </div>

        <!-- 预测按钮 -->
        <div class="card">
            <div style="display: flex; gap: 12px;">
                <button class="btn btn-primary btn-block" onclick="predictWithLocal()">
                    <i class="bi bi-calculator"></i> 本地算法
                </button>
                <button class="btn btn-secondary btn-block" onclick="predictWithAI()">
                    <i class="bi bi-stars"></i> AI智能推荐
                </button>
            </div>
        </div>

        <!-- 预测结果 -->
        <div id="prediction-result" style="display: none;">
            <div class="card">
                <div class="card-header">
                    <span class="card-title">🎯 推荐号码</span>
                    <span id="confidence-label" style="font-size: 12px; color: var(--success);">置信度 80%</span>
                </div>
                
                <div class="prediction-number" id="recommended-numbers">
                    <!-- JS生成 -->
                </div>
                
                <div class="confidence-bar">
                    <div class="confidence-fill" id="confidence-bar" style="width: 80%"></div>
                </div>
            </div>

            <div class="card">
                <div class="card-title" style="margin-bottom: 12px;">📝 分析说明</div>
                <div id="analysis-text" style="color: var(--text-secondary); font-size: 14px; line-height: 1.8;">
                    <!-- JS生成 -->
                </div>
            </div>
        </div>
    </div>

    <!-- 设置页 -->
    <div id="page-settings" class="page">
        <div class="card">
            <div class="card-title" style="margin-bottom: 16px;">🔄 同步设置</div>
            <div class="input-group">
                <label>飞书多维表格</label>
                <input type="text" id="feishu-url" placeholder="粘贴飞书表格链接" value="https://f39ukpc92q.feishu.cn/base/LpDqb4WOxak09Hse2eScWhlhnQh">
            </div>
            <button class="btn btn-outline btn-block" onclick="loadFeishuData()">
                <i class="bi bi-download"></i> 从飞书导入
            </button>
        </div>

        <div class="card">
            <div class="card-title" style="margin-bottom: 16px;">⚙️ 其他设置</div>
            <div style="display: flex; justify-content: space-between; align-items: center; padding: 12px 0; border-bottom: 1px solid var(--border);">
                <span>自动同步到飞书</span>
                <label class="switch">
                    <input type="checkbox" id="auto-sync">
                    <span class="slider"></span>
                </label>
            </div>
        </div>

        <div class="card disclaimer">
            <strong>⚠️ 免责声明</strong>
            <p style="margin-top: 8px;">彩票预测功能仅供参考娱乐，不构成任何投注建议。请理性购彩，量力而行。</p>
        </div>

        <div class="card">
            <div class="card-title" style="margin-bottom: 16px;">ℹ️ 关于</div>
            <div style="display: flex; justify-content: space-between; padding: 8px 0;">
                <span>版本</span>
                <span style="color: var(--text-secondary);">1.0.0</span>
            </div>
            <div style="display: flex; justify-content: space-between; padding: 8px 0;">
                <span>作者</span>
                <span style="color: var(--text-secondary);">大龙虾 🦞</span>
            </div>
        </div>
    </div>

    <!-- 底部导航 -->
    <nav class="tab-bar">
        <div class="tab-item active" data-page="home">
            <i class="bi bi-house"></i>
            <span>首页</span>
        </div>
        <div class="tab-item" data-page="prediction">
            <i class="bi bi-stars"></i>
            <span>预测</span>
        </div>
        <div class="tab-item" data-page="settings">
            <i class="bi bi-gear"></i>
            <span>设置</span>
        </div>
    </nav>

    <!-- 添加记录弹窗 -->
    <div id="modal-add" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h3>添加记录</h3>
                <button class="modal-close" onclick="closeModal('modal-add')">×</button>
            </div>
            <div class="modal-body">
                <div class="input-group">
                    <label>期号</label>
                    <input type="text" id="input-period" placeholder="例如: 2024050">
                </div>
                
                <div class="input-group">
                    <label>选择红球 (已选 <span id="red-count">0</span>/6)</label>
                    <div class="number-grid" id="red-ball-selector">
                        <!-- JS生成 1-33 -->
                    </div>
                </div>
                
                <div class="input-group">
                    <label>选择蓝球 (已选 <span id="blue-count">0</span>/1)</label>
                    <div class="number-grid" id="blue-ball-selector">
                        <!-- JS生成 1-16 -->
                    </div>
                </div>

                <div class="input-group">
                    <label>备注</label>
                    <textarea id="input-remarks" rows="2" placeholder="可选"></textarea>
                </div>
            </div>
            <div class="modal-footer">
                <button class="btn btn-outline" onclick="closeModal('modal-add')">取消</button>
                <button class="btn btn-primary" onclick="saveRecord()">保存</button>
            </div>
        </div>
    </div>

    <!-- 相机弹窗 -->
    <div id="modal-camera" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h3>📷 拍照识别</h3>
                <button class="modal-close" onclick="closeCamera()">×</button>
            </div>
            <div class="modal-body">
                <div class="camera-container">
                    <video id="camera-preview" autoplay playsinline></video>
                    <canvas id="camera-canvas" style="display: none;"></canvas>
                    <div class="camera-overlay"></div>
                    <div class="camera-controls">
                        <button class="btn btn-primary" onclick="captureImage()">
                            <i class="bi bi-camera-fill"></i> 拍照
                        </button>
                    </div>
                </div>
                <div id="ocr-result" style="text-align: center; padding: 16px; display: none;">
                    <div class="prediction-number" id="ocr-numbers"></div>
                    <p style="color: var(--text-secondary); margin-top: 8px;">识别结果如上，请确认后添加</p>
                </div>
            </div>
        </div>
    </div>

    <!-- 提示消息 -->
    <div id="toast" class="toast"></div>

    <script src="js/app.js"></script>
</body>
</html>
